services:
  subconverter:
    image: ghcr.io/slackworker/subconverter:integration-chain-subconverter
    networks:
      - subconverter-backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:25500/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: ghcr.io/slackworker/chain-subconverter:latest
    depends_on:
      subconverter:
        condition: service_healthy
    environment:
      CHAIN_SUBCONVERTER_HTTP_ADDRESS: :11200
      # USER_FACING_BASE_URL 可选；直连局域网通常留空，HTTPS 反代/公网域名或多入口场景再显式填写。
      # 若需固定发布地址，取消注释并填入实际可访问地址（例如 https://example.com）：
      # CHAIN_SUBCONVERTER_USER_FACING_BASE_URL: https://example.com
      # 仅在可信内网环境且模板 URL 需要指向私网/loopback 地址时才开启：
      # CHAIN_SUBCONVERTER_TEMPLATE_ALLOW_PRIVATE_NETWORKS: "false"
      # 设为 0 可关闭；默认建议保留：
      # CHAIN_SUBCONVERTER_WRITE_REQUESTS_PER_MINUTE: "60"
      # 设为 0 可关闭；默认建议保留：
      # CHAIN_SUBCONVERTER_READ_REQUESTS_PER_MINUTE: "60"
      # 常见 Docker + 宿主机反代场景的默认 trusted proxies；若你的反代 peer 不在这些网段，按实际改：
      CHAIN_SUBCONVERTER_TRUSTED_PROXY_CIDRS: "172.16.0.0/12"
      CHAIN_SUBCONVERTER_SUBCONVERTER_FACING_BASE_URL: http://app:11200
      CHAIN_SUBCONVERTER_DEFAULT_TEMPLATE_URL: https://raw.githubusercontent.com/slackworker/Custom_OpenClash_Rules/refs/heads/main/cfg/Custom_Clash.ini
      CHAIN_SUBCONVERTER_DEFAULT_TEMPLATE_FETCH_CACHE_TTL: 5m
      CHAIN_SUBCONVERTER_SUBCONVERTER_UPSTREAM_BASE_URL: http://subconverter:25500/sub?
      CHAIN_SUBCONVERTER_SHORT_LINK_DB_PATH: /data/short-links.sqlite3
      CHAIN_SUBCONVERTER_SHORT_LINK_CAPACITY: 100
    networks:
      - subconverter-backend
    ports:
      - "11200:11200"
    volumes:
      - short-link-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:11200/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  short-link-data:

networks:
  subconverter-backend:
