name: Build Docker Image & Deploy to Render

on:
  push:
    branches:
      - beta
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Leave empty to build the workflow commit, or set a branch / full SHA explicitly.
        required: false
        default: ''
      image_tag:
        description: Docker image tag to publish
        required: false
        default: dev-latest
      trigger_render:
        description: Trigger Render deploy hook after a successful manual build
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chain-subconverter

jobs:
  prepare:
    name: Prepare Docker Metadata
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      image_version: ${{ steps.plan.outputs.image_version }}
      source_sha: ${{ steps.source.outputs.sha }}
      tags: ${{ steps.plan.outputs.tags }}
      labels: ${{ steps.plan.outputs.labels }}
      should_trigger_render: ${{ steps.plan.outputs.should_trigger_render }}
      should_skip_validation: ${{ steps.plan.outputs.should_skip_validation }}
      primary_tag: ${{ steps.plan.outputs.primary_tag }}

    steps:
      - name: Resolve publish plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_TRIGGER_RENDER: ${{ inputs.trigger_render }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          checkout_ref="$GITHUB_SHA"
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_REF" ]]; then
            checkout_ref="$INPUT_REF"
          fi

          should_trigger_render=false
          should_skip_validation=false
          primary_tag=''
          image_version=''
          tags=()

          case "$EVENT_NAME" in
            push)
              if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
                primary_tag="${IMAGE_NAME}:latest"
                image_version='latest'
                tags+=("$primary_tag")
              elif [[ "$GITHUB_REF" == "refs/heads/beta" ]]; then
                primary_tag="${IMAGE_NAME}:beta-latest"
                image_version='beta-latest'
                tags+=("$primary_tag")
              elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
                version="${GITHUB_REF_NAME#v}"
                primary_tag="${IMAGE_NAME}:${version}"
                image_version="$version"
                tags+=("$primary_tag")
                if [[ "$version" == *-beta.* ]]; then
                  tags+=("${IMAGE_NAME}:beta-latest")
                else
                  tags+=("${IMAGE_NAME}:latest")
                  should_trigger_render=true
                fi
              else
                echo "Unsupported push ref: $GITHUB_REF" >&2
                exit 1
              fi
              ;;
            workflow_dispatch)
              primary_tag="${IMAGE_NAME}:${INPUT_IMAGE_TAG}"
              image_version="$INPUT_IMAGE_TAG"
              tags+=("$primary_tag")
              if [[ "$INPUT_IMAGE_TAG" == "dev-latest" ]]; then
                should_skip_validation=true
              fi
              if [[ "$INPUT_TRIGGER_RENDER" == "true" ]]; then
                should_trigger_render=true
              fi
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME" >&2
              exit 1
              ;;
          esac

          labels=$(
            printf '%s\n' \
              "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
              "org.opencontainers.image.version=${image_version}"
          )

          {
            echo "checkout_ref=$checkout_ref"
            echo "image_version=$image_version"
            echo "primary_tag=$primary_tag"
            echo "should_trigger_render=$should_trigger_render"
            echo "should_skip_validation=$should_skip_validation"
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo EOF
            echo 'labels<<EOF'
            printf '%s\n' "$labels"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.plan.outputs.checkout_ref }}

      - name: Capture source revision
        id: source
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  validate:
    name: Publish Validation
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Skip validation for manual dev-latest publish
        if: needs.prepare.outputs.should_skip_validation == 'true'
        run: echo "Skipping publish validation for manual dev-latest publish."

      - name: Wait for CI workflow success on source revision
        if: needs.prepare.outputs.should_skip_validation != 'true'
        uses: actions/github-script@v8
        env:
          TARGET_SHA: ${{ needs.prepare.outputs.source_sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'ci.yml';
            const targetSha = process.env.TARGET_SHA;
            const timeoutMs = 30 * 60 * 1000;
            const pollIntervalMs = 30 * 1000;
            const deadline = Date.now() + timeoutMs;

            core.info(`Waiting for CI to complete on ${targetSha}`);

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflowId,
                event: 'push',
                head_sha: targetSha,
                per_page: 20,
              });

              const runs = data.workflow_runs || [];
              const latestRun = runs[0];

              if (!latestRun) {
                core.info('No CI workflow run found yet for this commit; polling again.');
              } else if (latestRun.status !== 'completed') {
                core.info(
                  `CI run #${latestRun.run_number} is ${latestRun.status}; polling again.`
                );
              } else if (latestRun.conclusion === 'success') {
                core.info(`CI run #${latestRun.run_number} succeeded.`);
                break;
              } else {
                core.setFailed(
                  `CI run #${latestRun.run_number} concluded with ${latestRun.conclusion}.`
                );
                return;
              }

              if (Date.now() > deadline) {
                core.setFailed('Timed out waiting for CI success on the source revision.');
                return;
              }

              await new Promise((resolve) => setTimeout(resolve, pollIntervalMs));
            }

  build:
    name: Build ${{ matrix.platform }} image
    needs: [prepare, validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_pair: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_pair: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: |
            ${{ needs.prepare.outputs.labels }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.source_sha }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.image_version }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-publish-${{ matrix.platform_pair }}
          cache-to: type=gha,scope=docker-publish-${{ matrix.platform_pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Multi-Arch Image
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push tags
        working-directory: /tmp/digests
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          shopt -s nullglob

          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=("-t" "$tag")
          done <<< "$TAGS"

          digest_refs=()
          for digest in *; do
            digest_refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          if [[ ${#digest_refs[@]} -eq 0 ]]; then
            echo "No digests downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

      - name: Inspect published image
        run: docker buildx imagetools inspect ${{ needs.prepare.outputs.primary_tag }}

      - name: Trigger Render Deploy
        if: success() && needs.prepare.outputs.should_trigger_render == 'true'
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
