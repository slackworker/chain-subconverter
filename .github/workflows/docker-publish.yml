name: Build and Push Docker Image

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Leave empty to build the workflow commit, or set a branch / full SHA explicitly.
        required: false
        default: ''
      image_tag:
        description: Docker image tag to publish
        required: false
        default: dev-latest

concurrency:
  group: docker-publish-${{ github.event.workflow_run.head_sha || inputs.ref || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chain-subconverter

jobs:
  prepare:
    name: Prepare Docker Metadata
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      image_version: ${{ steps.plan.outputs.image_version }}
      release_tag: ${{ steps.plan.outputs.release_tag }}
      image_tag: ${{ steps.plan.outputs.image_tag }}
      source_sha: ${{ steps.source.outputs.sha }}
      tags: ${{ steps.plan.outputs.tags }}
      labels: ${{ steps.plan.outputs.labels }}
      should_skip_validation: ${{ steps.plan.outputs.should_skip_validation }}
      primary_tag: ${{ steps.plan.outputs.primary_tag }}

    steps:
      - name: Resolve publish plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          checkout_ref="$GITHUB_SHA"
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_REF" ]]; then
            checkout_ref="$INPUT_REF"
          elif [[ "$EVENT_NAME" == "workflow_run" ]]; then
            checkout_ref="$WORKFLOW_RUN_HEAD_SHA"
          fi

          should_skip_validation=false
          primary_tag=''
          image_version=''
          release_tag=''
          image_tag=''
          tags=()

          case "$EVENT_NAME" in
            workflow_run)
              primary_tag="${IMAGE_NAME}:latest"
              image_version='latest'
              image_tag='latest'
              tags+=("$primary_tag")
              ;;
            push)
              if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
                version="${GITHUB_REF_NAME#v}"
                primary_tag="${IMAGE_NAME}:${version}"
                image_version="$GITHUB_REF_NAME"
                release_tag="$GITHUB_REF_NAME"
                image_tag="$version"
                tags+=("$primary_tag")
                if [[ "$version" == *-beta.* ]]; then
                  tags+=("${IMAGE_NAME}:beta-latest")
                fi
              else
                echo "Unsupported push ref: $GITHUB_REF" >&2
                exit 1
              fi
              ;;
            workflow_dispatch)
              primary_tag="${IMAGE_NAME}:${INPUT_IMAGE_TAG}"
              image_version="$INPUT_IMAGE_TAG"
              image_tag="$INPUT_IMAGE_TAG"
              tags+=("$primary_tag")
              if [[ "$INPUT_IMAGE_TAG" == "dev-latest" ]]; then
                should_skip_validation=true
              fi
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME" >&2
              exit 1
              ;;
          esac

          labels=$(
            printf '%s\n' \
              "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
              "org.opencontainers.image.version=${image_version}"
          )

          {
            echo "checkout_ref=$checkout_ref"
            echo "image_version=$image_version"
            echo "release_tag=$release_tag"
            echo "image_tag=$image_tag"
            echo "primary_tag=$primary_tag"
            echo "should_skip_validation=$should_skip_validation"
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo EOF
            echo 'labels<<EOF'
            printf '%s\n' "$labels"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.plan.outputs.checkout_ref }}

      - name: Capture source revision
        id: source
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  validate:
    name: Publish Validation
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Skip validation for trusted publish paths
        if: needs.prepare.outputs.should_skip_validation == 'true' || github.event_name == 'workflow_run'
        run: |
          echo "Validation skipped for trusted publish path"
          echo "event=${{ github.event_name }}"
          echo "should_skip_validation=${{ needs.prepare.outputs.should_skip_validation }}"

      - name: Verify CI workflow success on source revision
        if: needs.prepare.outputs.should_skip_validation != 'true' && github.event_name != 'workflow_run'
        uses: actions/github-script@v8
        env:
          TARGET_SHA: ${{ needs.prepare.outputs.source_sha }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflowId = 'ci.yml';
            const targetSha = process.env.TARGET_SHA;

            core.info(`Verifying CI success on ${targetSha}`);

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: workflowId,
              event: 'push',
              head_sha: targetSha,
              per_page: 20,
            });

            const runs = data.workflow_runs || [];
            const successRun = runs.find(
              (run) => run.status === 'completed' && run.conclusion === 'success'
            );

            if (successRun) {
              core.info(`CI run #${successRun.run_number} succeeded.`);
              return;
            }

            const inProgress = runs.some((run) => run.status !== 'completed');
            if (inProgress) {
              core.setFailed(
                `CI is still running for ${targetSha}. Re-run this workflow after CI succeeds.`
              );
              return;
            }

            if (runs.length > 0) {
              const latestCompleted = runs[0];
              core.setFailed(
                `No successful CI run found for ${targetSha}. Latest run #${latestCompleted.run_number} concluded with ${latestCompleted.conclusion}.`
              );
              return;
            }

            core.setFailed(
              `No CI workflow run found for ${targetSha}. Ensure the commit exists on a CI-tracked branch (main/beta/dev) and CI completed successfully.`
            );

  build:
    name: Build ${{ matrix.platform }} image
    needs: [prepare, validate]
    if: |
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.validate.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_pair: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_pair: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: |
            ${{ needs.prepare.outputs.labels }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.source_sha }}
          build-args: |
            APP_VERSION=${{ needs.prepare.outputs.image_version }}
            APP_RELEASE_TAG=${{ needs.prepare.outputs.release_tag }}
            APP_IMAGE_TAG=${{ needs.prepare.outputs.image_tag }}
            APP_REVISION=${{ needs.prepare.outputs.source_sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-publish-${{ matrix.platform_pair }}
          cache-to: type=gha,scope=docker-publish-${{ matrix.platform_pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v5
        with:
          name: digest-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Multi-Arch Image
    needs: [prepare, build]
    if: |
      !cancelled() &&
      needs.prepare.result == 'success' &&
      needs.build.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create manifest list and push tags
        working-directory: /tmp/digests
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          shopt -s nullglob

          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=("-t" "$tag")
          done <<< "$TAGS"

          digest_refs=()
          for digest in *; do
            digest_refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          if [[ ${#digest_refs[@]} -eq 0 ]]; then
            echo "No digests downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

      - name: Inspect published image
        run: docker buildx imagetools inspect ${{ needs.prepare.outputs.primary_tag }}
