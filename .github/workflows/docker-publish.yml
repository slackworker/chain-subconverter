name: Build Docker Image & Deploy to Render

on:
  push:
    branches:
      - beta
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Leave empty to build the workflow commit, or set a branch / full SHA explicitly.
        required: false
        default: ''
      image_tag:
        description: Docker image tag to publish
        required: false
        default: dev-latest
      trigger_render:
        description: Trigger Render deploy hook after a successful manual build
        required: false
        type: boolean
        default: false

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/chain-subconverter

jobs:
  prepare:
    name: Prepare Docker Metadata
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.plan.outputs.checkout_ref }}
      source_sha: ${{ steps.source.outputs.sha }}
      tags: ${{ steps.plan.outputs.tags }}
      labels: ${{ steps.plan.outputs.labels }}
      should_trigger_render: ${{ steps.plan.outputs.should_trigger_render }}
      primary_tag: ${{ steps.plan.outputs.primary_tag }}

    steps:
      - name: Resolve publish plan
        id: plan
        env:
          EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_SHA: ${{ github.sha }}
          INPUT_REF: ${{ inputs.ref }}
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_TRIGGER_RENDER: ${{ inputs.trigger_render }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          checkout_ref="$GITHUB_SHA"
          if [[ "$EVENT_NAME" == "workflow_dispatch" && -n "$INPUT_REF" ]]; then
            checkout_ref="$INPUT_REF"
          fi

          should_trigger_render=false
          primary_tag=''
          image_version=''
          tags=()

          case "$EVENT_NAME" in
            push)
              if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
                primary_tag="${IMAGE_NAME}:latest"
                image_version='latest'
                tags+=("$primary_tag")
              elif [[ "$GITHUB_REF" == "refs/heads/beta" ]]; then
                primary_tag="${IMAGE_NAME}:beta-latest"
                image_version='beta-latest'
                tags+=("$primary_tag")
              elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
                version="${GITHUB_REF_NAME#v}"
                primary_tag="${IMAGE_NAME}:${version}"
                image_version="$version"
                tags+=("$primary_tag")
                if [[ "$version" == *-beta.* ]]; then
                  tags+=("${IMAGE_NAME}:beta-latest")
                else
                  tags+=("${IMAGE_NAME}:latest")
                  should_trigger_render=true
                fi
              else
                echo "Unsupported push ref: $GITHUB_REF" >&2
                exit 1
              fi
              ;;
            workflow_dispatch)
              primary_tag="${IMAGE_NAME}:${INPUT_IMAGE_TAG}"
              image_version="$INPUT_IMAGE_TAG"
              tags+=("$primary_tag")
              if [[ "$INPUT_TRIGGER_RENDER" == "true" ]]; then
                should_trigger_render=true
              fi
              ;;
            *)
              echo "Unsupported event: $EVENT_NAME" >&2
              exit 1
              ;;
          esac

          labels=$(
            printf '%s\n' \
              "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
              "org.opencontainers.image.version=${image_version}"
          )

          {
            echo "checkout_ref=$checkout_ref"
            echo "primary_tag=$primary_tag"
            echo "should_trigger_render=$should_trigger_render"
            echo 'tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo EOF
            echo 'labels<<EOF'
            printf '%s\n' "$labels"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.plan.outputs.checkout_ref }}

      - name: Capture source revision
        id: source
        run: |
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  validate:
    name: Publish Validation
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Skip validation for manual publish
        if: github.event_name == 'workflow_dispatch'
        run: echo "Skipping publish validation for workflow_dispatch."

      - name: Checkout repository
        if: github.event_name == 'push'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Set up Go
        if: github.event_name == 'push'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go test
        if: github.event_name == 'push'
        run: go test ./...

      - name: Set up Node.js
        if: github.event_name == 'push'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        if: github.event_name == 'push'
        working-directory: web
        run: npm ci

      - name: Build frontend schemes
        if: github.event_name == 'push'
        working-directory: web
        run: |
          npm run build:default
          npm run build:a
          npm run build:b
          npm run build:c

      - name: Validate deploy compose file
        if: github.event_name == 'push'
        run: docker compose -f deploy/docker-compose.yml config

  build:
    name: Build ${{ matrix.platform }} image
    needs: [prepare, validate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_pair: linux-amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            platform_pair: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: |
            ${{ needs.prepare.outputs.labels }}
            org.opencontainers.image.revision=${{ needs.prepare.outputs.source_sha }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-publish-${{ matrix.platform_pair }}
          cache-to: type=gha,scope=docker-publish-${{ matrix.platform_pair }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest artifact
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.platform_pair }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge Multi-Arch Image
    needs: [prepare, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create manifest list and push tags
        working-directory: /tmp/digests
        env:
          TAGS: ${{ needs.prepare.outputs.tags }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        run: |
          shopt -s nullglob

          tag_args=()
          while IFS= read -r tag; do
            [[ -n "$tag" ]] || continue
            tag_args+=("-t" "$tag")
          done <<< "$TAGS"

          digest_refs=()
          for digest in *; do
            digest_refs+=("${IMAGE_NAME}@sha256:${digest}")
          done

          if [[ ${#digest_refs[@]} -eq 0 ]]; then
            echo "No digests downloaded" >&2
            exit 1
          fi

          docker buildx imagetools create "${tag_args[@]}" "${digest_refs[@]}"

      - name: Inspect published image
        run: docker buildx imagetools inspect ${{ needs.prepare.outputs.primary_tag }}

      - name: Trigger Render Deploy
        if: success() && needs.prepare.outputs.should_trigger_render == 'true'
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
