name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - release/3.0

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go test
        run: go test ./...

  web-build:
    name: Web Build Matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        scheme: [default, a, b, c]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend scheme
        working-directory: web
        run: npm run build:${{ matrix.scheme }}

  compose-config:
    name: Compose Config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy compose file
        run: docker compose -f deploy/docker-compose.yml config