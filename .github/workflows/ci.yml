name: CI

on:
  pull_request:
  push:
    branches:
      - beta
      - main
      - dev
    tags:
      - 'v*'

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run go test
        run: go test ./...

  fixture-freshness:
    name: Fixture Freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Refresh canonical-derived review fixtures
        run: go run ./cmd/testfixturegen -repo-root .

      - name: Check tracked review fixtures are up to date
        run: |
          if ! git diff --exit-code -- internal/review/testdata; then
            echo "Generated review fixtures are stale. Run: go run ./cmd/testfixturegen -repo-root ."
            exit 1
          fi

  worker-fixture-freshness:
    name: Worker Fixture Freshness
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: deploy/test-fixtures-worker/package-lock.json

      - name: Install worker fixture dependencies
        working-directory: deploy/test-fixtures-worker
        run: npm ci

      - name: Check worker fixtures are up to date
        working-directory: deploy/test-fixtures-worker
        run: npm run check

  web-unit-test:
    name: Web Unit Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Run frontend unit tests
        working-directory: web
        run: npm run test

  web-mock-e2e:
    name: Web Mock E2E
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run mocked Playwright E2E tests
        working-directory: web
        run: npm run test:e2e:mock

  web-build:
    name: Web Build (release baseline)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        scheme: [default, a]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build frontend scheme
        working-directory: web
        run: npm run build:${{ matrix.scheme }}

  web-build-exploratory:
    name: Web Build (exploratory, non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        scheme: [b1, b2, c1, c2]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Build exploratory frontend scheme
        working-directory: web
        run: npm run build:${{ matrix.scheme }}

  compose-config:
    name: Compose Config
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deploy compose file
        run: docker compose -f deploy/docker-compose.yml config